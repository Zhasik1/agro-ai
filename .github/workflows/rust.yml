name: rust-core

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  rust-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust 1.74
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.74.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Cargo test
        working-directory: rust_core
        run: cargo test --all

      - name: Build extension (debug)
        working-directory: rust_core/crates/agroai_core
        run: maturin develop

      - name: Run Python integration tests
        run: |
          python -m pip install -r requirements-dev.txt
          pytest -q tests/test_rust_integration.py

  wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels via maturin-action
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust_core/crates/agroai_core
          command: build
          args: --release --out dist --interpreter python3.11 python3.12 --manylinux 2014

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agroai-core-wheels
          path: rust_core/crates/agroai_core/dist/*
