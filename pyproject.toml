[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["B008", "UP042"]  # B008: FastAPI Depends() pattern; UP042: StrEnum risks SQLAlchemy

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-ra"

[tool.coverage.run]
source = ["app"]
omit = ["app/__init__.py", "*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_empty = true
